<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌳 宣信魔法森林學園 🌳</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lilita+One&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --forest-deep: #1a3a2e;
  --forest-mid: #2d5a3d;
  --forest-light: #5a8c5e;
  --moss: #7fa650;
  --leaf: #a8d76e;
  --sun: #ffd966;
  --sun-glow: #ffb84d;
  --berry: #e85d75;
  --berry-deep: #c14458;
  --magic: #b88fd8;
  --magic-deep: #7c5fa3;
  --bark: #6b4423;
  --bark-light: #8b5a2b;
  --cream: #fff8e7;
  --mist: #e8f5e9;
  --gold: #f0c14b;
  --gold-deep: #c89824;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', 'Fredoka', sans-serif;
  background: linear-gradient(180deg, #2d5a3d 0%, #1a3a2e 50%, #0f2419 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--cream);
  position: relative;
}

/* 魔法森林背景 */
.forest-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.firefly {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--sun);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--sun), 0 0 20px var(--sun-glow), 0 0 30px var(--sun-glow);
  animation: float-firefly 8s infinite ease-in-out;
}

@keyframes float-firefly {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
  25% { transform: translate(30px, -40px) scale(1.2); opacity: 1; }
  50% { transform: translate(-20px, -80px) scale(0.8); opacity: 0.6; }
  75% { transform: translate(40px, -50px) scale(1.1); opacity: 0.9; }
}

.tree {
  position: absolute;
  bottom: 0;
  opacity: 0.3;
}

.mist-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(168, 215, 110, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(184, 143, 216, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 217, 102, 0.05) 0%, transparent 70%);
}

.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}

/* 主卡片 */
.card {
  background: linear-gradient(145deg, #fff8e7 0%, #ffeec7 100%);
  border-radius: 30px;
  padding: 40px;
  box-shadow:
    0 20px 60px rgba(0, 0, 0, 0.4),
    inset 0 2px 0 rgba(255, 255, 255, 0.8),
    0 0 0 4px var(--bark),
    0 0 0 8px var(--gold);
  color: var(--forest-deep);
  position: relative;
  animation: card-appear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes card-appear {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 裝飾葉子 */
.leaf-deco {
  position: absolute;
  font-size: 40px;
  opacity: 0.6;
  animation: leaf-sway 4s ease-in-out infinite;
}

@keyframes leaf-sway {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(15deg); }
}

/* 標題 */
.title {
  font-family: 'Lilita One', 'Noto Sans TC', cursive;
  font-size: 52px;
  text-align: center;
  background: linear-gradient(180deg, var(--forest-mid) 0%, var(--forest-deep) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-shadow: 3px 3px 0 rgba(107, 68, 35, 0.1);
}

.subtitle {
  text-align: center;
  font-size: 20px;
  color: var(--bark);
  margin-bottom: 40px;
  font-weight: 500;
}

.subtitle::before { content: "🌿 "; }
.subtitle::after { content: " 🌿"; }

/* 角色介紹 */
.mascot {
  text-align: center;
  font-size: 100px;
  margin: 20px 0;
  animation: bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
}

@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(0); }
  50% { transform: translateY(-15px) rotate(-5deg); }
}

/* 輸入區 */
.input-group {
  margin-bottom: 25px;
}

.input-label {
  display: block;
  font-size: 18px;
  font-weight: 700;
  color: var(--forest-deep);
  margin-bottom: 10px;
}

.input-field {
  width: 100%;
  padding: 15px 20px;
  font-size: 18px;
  font-family: inherit;
  border: 3px solid var(--moss);
  border-radius: 15px;
  background: white;
  color: var(--forest-deep);
  transition: all 0.3s;
}

.input-field:focus {
  outline: none;
  border-color: var(--berry);
  box-shadow: 0 0 0 4px rgba(232, 93, 117, 0.2);
  transform: translateY(-2px);
}

/* 按鈕 */
.btn {
  display: inline-block;
  padding: 16px 40px;
  font-size: 20px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  letter-spacing: 1px;
  box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
}

.btn-primary {
  background: linear-gradient(180deg, var(--berry) 0%, var(--berry-deep) 100%);
  color: white;
  box-shadow: 0 6px 0 var(--berry-deep), 0 8px 20px rgba(232, 93, 117, 0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 9px 0 var(--berry-deep), 0 12px 25px rgba(232, 93, 117, 0.5);
}

.btn-primary:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 var(--berry-deep);
}

.btn-magic {
  background: linear-gradient(180deg, var(--magic) 0%, var(--magic-deep) 100%);
  color: white;
  box-shadow: 0 6px 0 var(--magic-deep);
}

.btn-magic:hover {
  transform: translateY(-3px);
  box-shadow: 0 9px 0 var(--magic-deep), 0 12px 25px rgba(184, 143, 216, 0.5);
}

.btn-gold {
  background: linear-gradient(180deg, var(--sun) 0%, var(--gold-deep) 100%);
  color: var(--forest-deep);
  box-shadow: 0 6px 0 var(--gold-deep);
}

.btn-gold:hover {
  transform: translateY(-3px);
  box-shadow: 0 9px 0 var(--gold-deep);
}

/* 選擇卡片 */
.choice-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin: 30px 0;
}

.choice-card {
  background: white;
  border: 4px solid var(--moss);
  border-radius: 20px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.choice-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(168, 215, 110, 0.2) 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

.choice-card:hover {
  transform: translateY(-5px) rotate(-1deg);
  border-color: var(--berry);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
}

.choice-card:hover::before {
  opacity: 1;
}

.choice-card.selected {
  background: linear-gradient(135deg, var(--leaf) 0%, var(--moss) 100%);
  border-color: var(--forest-deep);
  color: white;
  transform: scale(1.05);
}

.choice-emoji {
  font-size: 60px;
  margin-bottom: 10px;
  display: block;
}

.choice-text {
  font-size: 20px;
  font-weight: 700;
  color: var(--forest-deep);
}

.choice-card.selected .choice-text { color: white; }

/* 年級選擇 */
.grade-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin: 25px 0;
}

.grade-btn {
  background: linear-gradient(145deg, white 0%, var(--mist) 100%);
  border: 3px solid var(--moss);
  border-radius: 18px;
  padding: 20px 10px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}

.grade-btn:hover {
  transform: translateY(-3px) scale(1.05);
  border-color: var(--berry);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}

.grade-num {
  font-family: 'Lilita One', cursive;
  font-size: 36px;
  color: var(--berry);
  display: block;
}

.grade-label {
  font-size: 14px;
  color: var(--forest-deep);
  font-weight: 600;
}

/* 題目區 */
.question-area {
  background: linear-gradient(135deg, var(--mist) 0%, white 100%);
  border-radius: 20px;
  padding: 30px;
  margin: 25px 0;
  border: 3px dashed var(--moss);
  position: relative;
}

.question-number {
  display: inline-block;
  background: var(--berry);
  color: white;
  padding: 5px 15px;
  border-radius: 20px;
  font-weight: 700;
  margin-bottom: 15px;
  font-size: 14px;
}

.question-text {
  font-size: 28px;
  font-weight: 700;
  color: var(--forest-deep);
  text-align: center;
  margin: 20px 0;
  line-height: 1.5;
  min-height: 60px;
}

.answers-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.answer-btn {
  background: white;
  border: 3px solid var(--moss);
  border-radius: 15px;
  padding: 20px;
  font-size: 22px;
  font-weight: 700;
  font-family: inherit;
  color: var(--forest-deep);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.answer-btn:hover {
  transform: translateY(-3px);
  border-color: var(--berry);
  background: var(--cream);
}

.answer-btn.correct {
  background: linear-gradient(135deg, var(--leaf) 0%, var(--moss) 100%);
  border-color: var(--forest-deep);
  color: white;
  animation: correct-pulse 0.5s;
}

.answer-btn.wrong {
  background: linear-gradient(135deg, var(--berry) 0%, var(--berry-deep) 100%);
  border-color: var(--berry-deep);
  color: white;
  animation: wrong-shake 0.5s;
}

@keyframes correct-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes wrong-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

/* 進度條 */
.progress-bar {
  background: rgba(45, 90, 61, 0.2);
  height: 25px;
  border-radius: 50px;
  overflow: hidden;
  margin: 20px 0;
  border: 3px solid var(--bark);
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--leaf) 0%, var(--moss) 50%, var(--sun) 100%);
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.4) 50%, transparent 100%);
  animation: shine 2s infinite;
}

@keyframes shine {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

/* 統計列 */
.stats-bar {
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-deep) 100%);
  padding: 15px;
  border-radius: 20px;
  margin: 20px 0;
  color: white;
  border: 3px solid var(--gold);
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-family: 'Lilita One', cursive;
  font-size: 28px;
  color: var(--sun);
  display: block;
}

.stat-label {
  font-size: 12px;
  opacity: 0.9;
}

/* 結果頁 */
.result-mascot {
  font-size: 150px;
  text-align: center;
  margin: 20px 0;
  animation: celebrate 1s ease-in-out infinite alternate;
}

@keyframes celebrate {
  from { transform: rotate(-10deg) scale(1); }
  to { transform: rotate(10deg) scale(1.1); }
}

.score-display {
  text-align: center;
  margin: 30px 0;
}

.score-number {
  font-family: 'Lilita One', cursive;
  font-size: 100px;
  background: linear-gradient(180deg, var(--sun) 0%, var(--gold-deep) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 4px 4px 0 rgba(107, 68, 35, 0.2);
}

.score-label {
  font-size: 24px;
  color: var(--bark);
  font-weight: 700;
}

.medal {
  font-size: 80px;
  text-align: center;
  margin: 20px 0;
}

.feedback-text {
  text-align: center;
  font-size: 22px;
  color: var(--forest-deep);
  font-weight: 600;
  margin: 20px 0;
  line-height: 1.6;
}

/* 排行榜 */
.leaderboard {
  background: linear-gradient(135deg, var(--cream) 0%, white 100%);
  border-radius: 20px;
  padding: 25px;
  margin: 20px 0;
  border: 3px solid var(--gold);
}

.leaderboard-title {
  font-family: 'Lilita One', cursive;
  font-size: 32px;
  text-align: center;
  color: var(--forest-deep);
  margin-bottom: 20px;
}

.leader-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 15px 20px;
  border-radius: 12px;
  margin-bottom: 10px;
  border-left: 6px solid var(--moss);
  transition: transform 0.2s;
}

.leader-item:hover {
  transform: translateX(5px);
}

.leader-item.rank-1 {
  border-left-color: var(--gold);
  background: linear-gradient(90deg, rgba(240, 193, 75, 0.2) 0%, white 100%);
}

.leader-item.rank-2 {
  border-left-color: #c0c0c0;
  background: linear-gradient(90deg, rgba(192, 192, 192, 0.2) 0%, white 100%);
}

.leader-item.rank-3 {
  border-left-color: #cd7f32;
  background: linear-gradient(90deg, rgba(205, 127, 50, 0.2) 0%, white 100%);
}

.leader-rank {
  font-family: 'Lilita One', cursive;
  font-size: 28px;
  width: 50px;
  color: var(--berry);
}

.leader-info {
  flex: 1;
  margin: 0 15px;
}

.leader-name {
  font-weight: 700;
  font-size: 18px;
  color: var(--forest-deep);
}

.leader-detail {
  font-size: 13px;
  color: var(--bark);
}

.leader-score {
  font-family: 'Lilita One', cursive;
  font-size: 24px;
  color: var(--berry);
}

.btn-row {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 25px;
}

/* 隱藏 */
.hidden { display: none !important; }

/* 慶祝彩帶 */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  z-index: 100;
  pointer-events: none;
}

@media (max-width: 600px) {
  .title { font-size: 36px; }
  .question-text { font-size: 22px; }
  .choice-grid, .answers-grid { grid-template-columns: 1fr; }
  .grade-grid { grid-template-columns: repeat(3, 1fr); }
  .card { padding: 25px 20px; }
  .score-number { font-size: 70px; }
  .result-mascot { font-size: 100px; }
}
</style>
</head>
<body>

<div class="forest-bg">
  <div class="mist-layer"></div>
  <!-- 螢火蟲將由 JS 生成 -->
</div>

<div class="container">

  <!-- 起始頁 -->
  <div id="screen-start" class="card">
    <div class="leaf-deco" style="top: 20px; left: 20px;">🍃</div>
    <div class="leaf-deco" style="top: 30px; right: 30px; animation-delay: 1s;">🌿</div>
    <div class="leaf-deco" style="bottom: 30px; left: 30px; animation-delay: 2s;">🍂</div>

    <h1 class="title">魔法森林學園</h1>
    <p class="subtitle">宣信國小 1-6 年級 數學・英文 評量</p>

    <div class="mascot">🦉</div>

    <div class="input-group">
      <label class="input-label">🌟 小冒險家，請告訴我你的名字：</label>
      <input type="text" id="player-name" class="input-field" placeholder="輸入你的名字..." maxlength="10">
    </div>

    <div class="input-group">
      <label class="input-label">📚 你是幾年級的小法師？</label>
      <div class="grade-grid">
        <button class="grade-btn" data-grade="1"><span class="grade-num">1</span><span class="grade-label">一年級</span></button>
        <button class="grade-btn" data-grade="2"><span class="grade-num">2</span><span class="grade-label">二年級</span></button>
        <button class="grade-btn" data-grade="3"><span class="grade-num">3</span><span class="grade-label">三年級</span></button>
        <button class="grade-btn" data-grade="4"><span class="grade-num">4</span><span class="grade-label">四年級</span></button>
        <button class="grade-btn" data-grade="5"><span class="grade-num">5</span><span class="grade-label">五年級</span></button>
        <button class="grade-btn" data-grade="6"><span class="grade-num">6</span><span class="grade-label">六年級</span></button>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">🎯 選擇你的冒險主題：</label>
      <div class="choice-grid">
        <div class="choice-card" data-subject="math">
          <span class="choice-emoji">🔢</span>
          <span class="choice-text">數學魔法</span>
        </div>
        <div class="choice-card" data-subject="english">
          <span class="choice-emoji">🔤</span>
          <span class="choice-text">英文咒語</span>
        </div>
      </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <button class="btn btn-primary" onclick="startQuiz()">✨ 開始冒險 ✨</button>
      <button class="btn btn-gold" onclick="showLeaderboard()" style="margin-left: 10px;">🏆 排行榜</button>
    </div>
  </div>

  <!-- 測驗頁 -->
  <div id="screen-quiz" class="card hidden">
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="current-q">1</span>
        <span class="stat-label">題目</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="current-score">0</span>
        <span class="stat-label">得分</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="streak">0</span>
        <span class="stat-label">🔥連勝</span>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <div class="question-area">
      <div style="text-align: center;">
        <span class="question-number" id="q-number">第 1 題 / 共 10 題</span>
      </div>
      <div class="mascot" id="quiz-mascot" style="font-size: 70px;">🧚</div>
      <div class="question-text" id="question-text"></div>
      <div class="answers-grid" id="answers"></div>
    </div>
  </div>

  <!-- 結果頁 -->
  <div id="screen-result" class="card hidden">
    <h1 class="title">冒險結束！</h1>
    <div class="result-mascot" id="result-mascot">🎉</div>
    <div class="medal" id="result-medal">🏅</div>

    <div class="score-display">
      <div class="score-number" id="final-score">0</div>
      <div class="score-label">總分（滿分 100）</div>
    </div>

    <div class="feedback-text" id="feedback"></div>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="correct-count">0</span>
        <span class="stat-label">答對</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="wrong-count">0</span>
        <span class="stat-label">答錯</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="best-streak">0</span>
        <span class="stat-label">最佳連勝</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="restart()">🔄 再玩一次</button>
      <button class="btn btn-gold" onclick="showLeaderboard()">🏆 看排行榜</button>
    </div>
  </div>

  <!-- 排行榜頁 -->
  <div id="screen-leaderboard" class="card hidden">
    <h1 class="title">🏆 魔法榜 🏆</h1>
    <p class="subtitle">森林裡最厲害的小法師們</p>

    <div class="leaderboard">
      <div class="leaderboard-title">⭐ 名人堂 ⭐</div>
      <div id="leader-list"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="goHome()">🏠 回到森林</button>
      <button class="btn btn-magic" onclick="clearLeaderboard()">🗑️ 清空榜單</button>
    </div>
  </div>

</div>

<script>
// ============== 螢火蟲背景 ==============
function createFireflies() {
  const bg = document.querySelector('.forest-bg');
  for (let i = 0; i < 30; i++) {
    const f = document.createElement('div');

function generateMathQuestions(grade) {
  const questions = [];
  const used = new Set();

  function uniqueQ(generator) {
    let q, key, tries = 0;
    do {
      q = generator();
      key = q.q;
      tries++;
    } while (used.has(key) && tries < 20);
    used.add(key);
    return q;
  }

  for (let i = 0; i < 10; i++) {
    let q;
    if (grade === 1) {
      // 1年級：10以內加減法
      q = uniqueQ(() => {
        const op = Math.random() < 0.5 ? '+' : '-';
        let a = Math.floor(Math.random() * 9) + 1;
        let b = Math.floor(Math.random() * 9) + 1;
        if (op === '-' && b > a) [a, b] = [b, a];
        const ans = op === '+' ? a + b : a - b;
        return makeMC(`${a} ${op} ${b} = ?`, ans);
      });
    } else if (grade === 2) {
      // 2年級：100以內加減法、簡單乘法
      q = uniqueQ(() => {
        const type = Math.random();
        if (type < 0.5) {
          const a = Math.floor(Math.random() * 80) + 10;
          const b = Math.floor(Math.random() * 80) + 10;
          const op = Math.random() < 0.5 ? '+' : '-';
          if (op === '-' && b > a) return makeMC(`${b} - ${a} = ?`, b - a);
          return makeMC(`${a} ${op} ${b} = ?`, op === '+' ? a + b : a - b);
        } else {
          const a = Math.floor(Math.random() * 9) + 1;
          const b = Math.floor(Math.random() * 9) + 1;
          return makeMC(`${a} × ${b} = ?`, a * b);
        }
      });
    } else if (grade === 3) {
      // 3年級：乘除法、三位數加減
      q = uniqueQ(() => {
        const type = Math.random();
        if (type < 0.4) {
          const a = Math.floor(Math.random() * 12) + 2;
          const b = Math.floor(Math.random() * 9) + 2;
          return makeMC(`${a} × ${b} = ?`, a * b);
        } else if (type < 0.7) {
          const b = Math.floor(Math.random() * 8) + 2;
          const ans = Math.floor(Math.random() * 9) + 2;
          return makeMC(`${b * ans} ÷ ${b} = ?`, ans);
        } else {
          const a = Math.floor(Math.random() * 500) + 100;
          const b = Math.floor(Math.random() * 300) + 50;
          return makeMC(`${a} + ${b} = ?`, a + b);
        }
      });
    } else if (grade === 4) {
      // 4年級：較大乘除、簡單分數
      q = uniqueQ(() => {
        const type = Math.random();
        if (type < 0.4) {
          const a = Math.floor(Math.random() * 30) + 10;
          const b = Math.floor(Math.random() * 9) + 2;
          return makeMC(`${a} × ${b} = ?`, a * b);
        } else if (type < 0.7) {
          const b = Math.floor(Math.random() * 8) + 2;
          const ans = Math.floor(Math.random() * 20) + 5;
          return makeMC(`${b * ans} ÷ ${b} = ?`, ans);
        } else {
          const a = Math.floor(Math.random() * 900) + 100;
          const b = Math.floor(Math.random() * 500) + 100;
          return makeMC(`${a} - ${b} = ?`, a - b);
        }
      });
    } else if (grade === 5) {
      // 5年級：分數、小數、較複雜計算
      q = uniqueQ(() => {
        const type = Math.random();
        if (type < 0.3) {
          const a = (Math.random() * 9 + 1).toFixed(1);
          const b = (Math.random() * 9 + 1).toFixed(1);
          const ans = +(parseFloat(a) + parseFloat(b)).toFixed(1);
          return makeMC(`${a} + ${b} = ?`, ans, true);
        } else if (type < 0.6) {
          const a = Math.floor(Math.random() * 50) + 10;
          const b = Math.floor(Math.random() * 12) + 3;
          return makeMC(`${a} × ${b} = ?`, a * b);
        } else {
          const b = Math.floor(Math.random() * 10) + 3;
          const ans = Math.floor(Math.random() * 30) + 10;
          return makeMC(`${b * ans} ÷ ${b} = ?`, ans);
        }
      });
    } else {
      // 6年級：百分比、複雜運算、簡單方程
      q = uniqueQ(() => {
        const type = Math.random();
        if (type < 0.3) {
          const a = (Math.floor(Math.random() * 5) + 1) * 10;
          const b = Math.floor(Math.random() * 200) + 50;
          return makeMC(`${b} 的 ${a}% 是多少？`, b * a / 100);
        } else if (type < 0.6) {
          const a = Math.floor(Math.random() * 80) + 20;
          const b = Math.floor(Math.random() * 15) + 5;
          return makeMC(`${a} × ${b} = ?`, a * b);
        } else {
          const x = Math.floor(Math.random() * 20) + 5;
          const c = Math.floor(Math.random() * 30) + 10;
          return makeMC(`若 x + ${c} = ${x + c}，則 x = ?`, x);
        }
      });
    }
    questions.push(q);
  }
  return questions;
}

function makeMC(question, answer, isFloat = false) {
  const opts = new Set([answer]);
  while (opts.size < 4) {
    const offset = (Math.floor(Math.random() * 10) + 1) * (Math.random() < 0.5 ? -1 : 1);
    let wrong = isFloat ? +(answer + offset * 0.1).toFixed(1) : answer + offset;
    if (wrong >= 0 && wrong !== answer) opts.add(wrong);
  }
  const optsArr = [...opts].sort(() => Math.random() - 0.5);
  return { q: question, options: optsArr.map(String), correct: String(answer) };
}

  subject: null,
  questions: [],

  score: 0,
  correct: 0,
  wrong: 0,
  streak: 0,

};

document.querySelectorAll('.grade-btn').forEach(btn => {

    state.subject = card.dataset.subject;
  });
});

function startQuiz() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { alert('🦉 小冒險家，請先告訴我你的名字喔！'); return; }
  if (!state.grade) { alert('📚 請選擇你的年級！'); return; }
  if (!state.subject) { alert('🎯 請選擇你的冒險主題！'); return; }

  state.name = name;
  state.questions = state.subject === 'math'
    ? generateMathQuestions(state.grade)
    : generateEnglishQuestions(state.grade);
  state.currentIndex = 0;
  state.score = 0;
  state.correct = 0;
  state.wrong = 0;
  state.streak = 0;
  state.bestStreak = 0;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  document.getElementById('q-number').textContent = `第 ${state.currentIndex + 1} 題 / 共 10 題`;
  document.getElementById('current-q').textContent = state.currentIndex + 1;
  document.getElementById('current-score').textContent = state.score;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('progress').style.width = ((state.currentIndex) / 10 * 100) + '%';

  const mascots = ['🧚', '🦉', '🐿️', '🦊', '🦔', '🐢', '🦋', '🐝', '🌳', '🍄'];
  document.getElementById('quiz-mascot').textContent = mascots[state.currentIndex % mascots.length];

  document.getElementById('question-text').textContent = q.q;

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, opt, q.correct);
    answersDiv.appendChild(btn);
  });
}

function selectAnswer(btn, selected, correct) {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  if (selected === correct) {
    btn.classList.add('correct');
    state.score += 10;
    state.correct++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    burstConfetti();
  } else {
    btn.classList.add('wrong');
    state.wrong++;
    state.streak = 0;
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }

  setTimeout(() => {
    state.currentIndex++;
    if (state.currentIndex >= 10) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }, 1200);
}

function finishQuiz() {
  document.getElementById('progress').style.width = '100%';

  setTimeout(() => {
    document.getElementById('final-score').textContent = state.score;
    document.getElementById('correct-count').textContent = state.correct;
    document.getElementById('wrong-count').textContent = state.wrong;
    document.getElementById('best-streak').textContent = state.bestStreak;

    let medal, mascot, feedback;
    if (state.score >= 90) {
      medal = '🥇'; mascot = '🦄';
      feedback = `太厲害了，${state.name}！你是真正的森林大法師！`;
    } else if (state.score >= 70) {
      medal = '🥈'; mascot = '🧚';
      feedback = `做得好，${state.name}！你已經是高階魔法師了！`;
    } else if (state.score >= 50) {
      medal = '🥉'; mascot = '🦉';
      feedback = `加油，${state.name}！繼續修煉就能更上一層樓！`;
    } else {
      medal = '🌱'; mascot = '🐿️';
      feedback = `沒關係，${state.name}！每位大法師都是從小苗開始的！`;
    }

    document.getElementById('result-medal').textContent = medal;
    document.getElementById('result-mascot').textContent = mascot;
    document.getElementById('feedback').textContent = feedback;

    saveScore();
    showScreen('result');
    burstConfetti(true);
  }, 600);
}

let leaderboardData = [];

function saveScore() {
  leaderboardData.push({
    name: state.name,
    grade: state.grade,
    subject: state.subject,
    score: state.score,
    correct: state.correct,
    date: new Date().toLocaleDateString('zh-TW'),
  });
  leaderboardData.sort((a, b) => b.score - a.score);
  if (leaderboardData.length > 20) leaderboardData = leaderboardData.slice(0, 20);
}

          <div class="leader-detail">${item.grade}年級 · ${subjectIcon} · 答對 ${item.correct}/10 · ${item.date}</div>
        </div>
        <div class="leader-score">${item.score}分</div>
      `;
      list.appendChild(div);
    });
  }
  showScreen('leaderboard');
}

function clearLeaderboard() {
  if (confirm('🗑️ 確定要清空排行榜嗎？')) {
    leaderboardData = [];
    showLeaderboard();
  }
}

function restart() {
  state.currentIndex = 0;
  state.score = 0;
  state.correct = 0;
  state.wrong = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.questions = state.subject === 'math'
    ? generateMathQuestions(state.grade)
    : generateEnglishQuestions(state.grade);
  showScreen('quiz');
  renderQuestion();
}

function goHome() {
  showScreen('start');
}

function showScreen(name) {
  ['start', 'quiz', 'result', 'leaderboard'].forEach(s => {
    document.getElementById(`screen-${s}`).classList.add('hidden');
  });
  document.getElementById(`screen-${name}`).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============== 慶祝彩帶 ==============
function burstConfetti(big = false) {
  const colors = ['#ffd966', '#e85d75', '#a8d76e', '#b88fd8', '#7fa650', '#f0c14b'];
  const count = big ? 80 : 20;
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.left = (50 + (Math.random() - 0.5) * 30) + '%';
    c.style.top = '50%';
    c.style.borderRadius = Math.random() < 0.5 ? '50%' : '0';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);

    const angle = Math.random() * Math.PI * 2;
    const speed = 200 + Math.random() * 300;
    const tx = Math.cos(angle) * speed;
    const ty = Math.sin(angle) * speed - 200;

    c.animate([
      { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${tx}px, ${ty + 600}px) rotate(${720 + Math.random() * 360}deg)`, opacity: 0 }
    ], { duration: 1500 + Math.random() * 500, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' });

    setTimeout(() => c.remove(), 2000);
  }
}
