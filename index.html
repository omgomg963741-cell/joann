<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;

      radial-gradient(circle at 20% 30%, rgba(218, 165, 32, 0.08) 0%, transparent 50%),

  }
  .question-area {
    background: linear-gradient(135deg, #faf3e0 0%, #f4e4c1 100%);

  .question-meta {

    background: #fff; border: 2px solid #c0392b; border-radius: 4px;

    font-family: "Noto Serif TC", serif; width: 100%; font-weight: 500;
    position: relative; overflow: hidden;
  }
  .option::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(244, 208, 63, 0.3), transparent);
    transition: left 0.5s;
  }
  .option:hover:not(:disabled) {
    border-color: #f4d03f; background: #fff5cc;
    transform: translateX(4px); box-shadow: -4px 4px 0 #c0392b;
  }
  .option:hover:not(:disabled)::before { left: 100%; }
  .option strong {
    color: #c0392b; margin-right: 8px;
    font-family: "ZCOOL KuaiLe", serif; font-size: 18px;
  }
  .option.correct {
    background: #1e8449; border-color: #145a32; color: #fff;
    transform: translateX(4px); box-shadow: -4px 4px 0 #145a32;
  }
  .option.correct strong { color: #f4d03f; }
  .option.wrong {
    background: #6c0e07; border-color: #4a0904; color: #fff;
    transform: translateX(4px); box-shadow: -4px 4px 0 #4a0904;
  }
  .option.wrong strong { color: #f4d03f; }
  .option:disabled { cursor: default; }
  .feedback {
    margin-top: 18px; padding: 16px 20px; border-radius: 4px;
    font-size: 14px; line-height: 1.7; border-left: 4px solid; position: relative;
  }
  .feedback.right { background: rgba(30, 132, 73, 0.15); color: #145a32; border-color: #1e8449; }
  .feedback.bad { background: rgba(108, 14, 7, 0.12); color: #6c0e07; border-color: #6c0e07; }
  .feedback strong {
    font-family: "ZCOOL KuaiLe", serif; font-size: 16px;
    letter-spacing: 1px; display: block; margin-bottom: 6px;
  }
  .next-btn-wrap { margin-top: 18px; display: flex; justify-content: flex-end; }
  .stage-result {
    background: linear-gradient(135deg, #c0392b 0%, #8b1f1a 100%);
    border: 3px double #f4d03f; border-radius: 4px; padding: 32px 24px;
    text-align: center; margin-bottom: 18px; color: #f4e4c1;
    box-shadow: 0 8px 24px rgba(192, 57, 43, 0.5); position: relative;
    animation: popIn 0.5s ease;
  }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.8); }

  }
  .stage-result-title {
    font-family: "Ma Shan Zheng", serif; font-size: 22px; font-weight: 900;
    color: #f4d03f; margin-bottom: 14px; letter-spacing: 3px;
  }
  .stage-result-score {
    font-family: "ZCOOL KuaiLe", serif; font-size: 48px; font-weight: 900; color: #f4d03f;
    text-shadow: 3px 3px 0 #1a0a0a, 0 0 20px rgba(244, 208, 63, 0.6); letter-spacing: 4px;
  }
  .stage-result-total { font-size: 14px; color: #f4e4c1; margin-top: 12px; letter-spacing: 2px; opacity: 0.9; }
  .result-area {
    text-align: center; padding: 48px 24px;
    background: linear-gradient(135deg, #faf3e0 0%, #f4e4c1 100%);
    border-radius: 4px; border: 4px double #8b1f1a;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5); position: relative; margin-top: 20px;
  }
  .result-area::before {
    content: ''; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px;
    border: 2px solid #c0392b; border-radius: 2px; pointer-events: none;
  }
  .result-trophy { font-size: 64px; margin-bottom: 12px; animation: bounce 2s ease infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .result-decoration { font-family: "ZCOOL KuaiLe", serif; font-size: 13px; color: #8b1f1a; letter-spacing: 6px; margin-bottom: 12px; }
  .result-label { font-size: 13px; color: #8b1f1a; margin-top: 12px; letter-spacing: 4px; }
  .result-score {
    font-family: "ZCOOL KuaiLe", serif; font-size: 72px; font-weight: 900; color: #c0392b;
    margin: 12px 0; letter-spacing: 4px;
    text-shadow: 4px 4px 0 #f4d03f, 6px 6px 0 #1a0a0a;
  }
  .result-rank {
    font-family: "Ma Shan Zheng", serif; font-size: 26px; font-weight: 900;
    padding: 14px 32px; border-radius: 4px; display: inline-block;
    margin: 16px 0; letter-spacing: 4px; border: 3px double;
  }
  .result-rank.r1 {
    background: linear-gradient(135deg, #f4d03f 0%, #d4ac0d 100%);
    color: #6c0e07; border-color: #8b1f1a; box-shadow: 0 0 30px rgba(244, 208, 63, 0.6);
  }
  .result-rank.r2 {
    background: linear-gradient(135deg, #c0392b 0%, #8b1f1a 100%);
    color: #f4d03f; border-color: #f4d03f; box-shadow: 0 0 20px rgba(192, 57, 43, 0.5);
  }
  .result-rank.r3 {
    background: linear-gradient(135deg, #1e8449 0%, #145a32 100%);
    color: #f4d03f; border-color: #f4d03f;
  }
  .result-rank.r0 {
    background: linear-gradient(135deg, #4a4a4a 0%, #2c2c2c 100%);
    color: #f4d03f; border-color: #888;
  }
  .result-msg {
    font-size: 16px; color: #2c1810; margin-top: 18px; line-height: 1.9;
    max-width: 540px; margin-left: auto; margin-right: auto; padding: 0 16px;
    font-style: italic; letter-spacing: 1px;
  }
  .btn {
    background: linear-gradient(135deg, #faf3e0 0%, #f4e4c1 100%);
    border: 2px solid #8b1f1a; border-radius: 4px; padding: 12px 28px;
    font-size: 15px; cursor: pointer; color: #8b1f1a;
    font-family: "Ma Shan Zheng", serif; font-weight: 700; letter-spacing: 3px;
    transition: all 0.2s; box-shadow: 0 3px 0 #6c0e07;
  }
  .btn:hover { background: #fff5cc; transform: translateY(-2px); box-shadow: 0 5px 0 #6c0e07; }
  .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #6c0e07; }
  .btn.primary {
    background: linear-gradient(135deg, #c0392b 0%, #8b1f1a 100%);
    color: #f4d03f; border-color: #f4d03f;
    box-shadow: 0 3px 0 #4a0904, 0 0 12px rgba(192, 57, 43, 0.4);
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, #d44a3b 0%, #9b2520 100%);
    box-shadow: 0 5px 0 #4a0904, 0 0 20px rgba(192, 57, 43, 0.6);
  }
  .center { text-align: center; margin-top: 18px; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .title { font-size: 32px; letter-spacing: 4px; }
    .header { padding: 28px 16px; }
    .header::before, .header::after { font-size: 22px; }
    .question-text { font-size: 16px; }
    .quote-box { font-size: 15px; padding: 20px 18px 16px; }
    .stage-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stage-name { font-size: 16px; }
    .result-score { font-size: 56px; }
    .result-rank { font-size: 20px; padding: 12px 20px; }
    .stage-result-score { font-size: 38px; }
    .progress-score { font-size: 20px; }
    .option { font-size: 14px; }
  }
</style>

<body>
<div class="container">
  <div class="header">
    <div class="top-decoration">★ 無 厘 頭 考 驗 ★</div>
    <h1 class="title">星爺經典對話測驗</h1>
    <p class="subtitle">「曾經有一份真摯的考題擺在我面前,我沒有珍惜⋯⋯」</p>
    <div class="bottom-decoration">— 周 星 馳 ・ 經 典 台 詞 —</div>
  </div>
  <div id="content"></div>
</div>

<script>
const movies = [
  { id: 0, name: '賭聖／賭俠', year: '1990' },
  { id: 1, name: '整人專家', year: '1991' },
  { id: 2, name: '逃學威龍', year: '1991' },
  { id: 3, name: '家有囍事', year: '1992' },
  { id: 4, name: '威龍闖天關', year: '1992' },
  { id: 5, name: '鹿鼎記', year: '1992' },
  { id: 6, name: '唐伯虎點秋香', year: '1993' },
  { id: 7, name: '九品芝麻官', year: '1994' },
  { id: 8, name: '國產凌凌漆', year: '1994' },
  { id: 9, name: '大話西遊', year: '1995' }
];

// 每題格式：台詞 → 挖空處要填什麼 → 問題 → 選項 → 答案 → 解說
// 重點：挖空答案 = 選項中的正解，三者必須完全一致！
const questions = [
  // 0. 賭聖／賭俠
  [
    {quote:'我叫阿星，外婆叫我做[____]。', speaker:'阿星 自我介紹', q:'空格處應填入什麼，是阿星外婆給他的綽號？', o:['賭神','賭俠','賭聖','賭仙'], a:2, e:'「我叫阿星，外婆叫我做賭聖」這就是電影名稱的由來。'},
    {quote:'吃[____]會給你power的！', speaker:'阿星 對綺夢說', q:'空格處應填入什麼食物，是阿星發功的能量來源？', o:['叉燒','香蕉','朱古力','汽水'], a:2, e:'阿星愛吃朱古力（巧克力），是他發特異功能的「燃料」，還會分給綺夢吃。'},
    {quote:'我有[____]，可以變出任何牌！', speaker:'阿星 解釋能力', q:'空格處應填入什麼，是阿星在賭桌上無敵的關鍵？', o:['透視眼','特異功能','千里眼','順風耳'], a:1, e:'阿星的「特異功能」可以變換牌的點數、看穿物品，是他制勝的秘密武器。'},
    {quote:'我的夢中情人叫[____]！', speaker:'阿星 思念', q:'空格處應填入什麼，是張敏飾演的角色名字？', o:['可兒','晶晶','綺夢','如夢'], a:2, e:'「綺夢」是張敏飾演的角色，名字本身就充滿夢幻氣息，是阿星至死不渝的初戀。'},
    {quote:'其實我是一個[____]！', speaker:'高進 對阿星表明身分', q:'空格處應填入什麼，是周潤發在《賭俠》客串的神祕身分？', o:['賭神','賭俠','賭聖','刀手'], a:0, e:'《賭俠》中周潤發以「賭神」高進的身分客串，正是阿星的師父。'},
    {quote:'我是賭俠[____]！', speaker:'劉德華 自我介紹', q:'空格處應填入什麼，是劉德華飾演的角色名字？', o:['陳小刀','陳刀仔','陳一刀','刀刀'], a:1, e:'劉德華飾演的「陳刀仔」是阿星的徒弟兼搭檔，外號賭俠，與阿星組成黃金組合。'},
    {quote:'阿星！[____]叫你！', speaker:'達叔 大聲呼喊', q:'空格處應填入什麼，是吳孟達飾演阿星舅父的名字？', o:['大軍','三叔','三太','大壯'], a:0, e:'吳孟達飾演阿星的舅父「大軍」，常常扯著喉嚨喊阿星，兩人合作無間。'},
    {quote:'三條A，三條A大過[____]！', speaker:'阿星 賭桌上', q:'空格處應填入什麼牌型，是三條A可以贏過的？', o:['一對','兩對','同花','葫蘆'], a:1, e:'梭哈中三條A大過兩對，是電影梭哈賭局的關鍵橋段。'},
    {quote:'看我發功！[____]！', speaker:'阿星 必殺技', q:'空格處應填入什麼動作，是阿星發功的招牌姿勢？', o:['雙手合十','三指放額頭','閉眼念咒','吹口氣'], a:1, e:'阿星發功時把三隻手指放在額頭上，頭髮會飛起來，這個動作後來被無數人模仿。'},
    {quote:'今晚最後賭局，玩[____]！', speaker:'《賭俠》最終決戰', q:'空格處應填入什麼賭法，是《賭俠》最後的決勝方式？', o:['撲克','骰子','梭哈','花牌'], a:2, e:'最後決戰是經典的梭哈（show hand）橋段，緊張刺激讓人屏息。'}
  ],

let state = {
  currentStage: -1, currentQ: 0, stageScore: 0,
  stageScores: Array(10).fill(null), totalScore: 0,
  answered: false, selectedAnswer: -1
};

const root = document.getElementById('content');

function renderHome() {
  let html = '<div class="progress-bar"><span class="progress-label">目前總分</span><span class="progress-score">' + state.totalScore + ' / 1000</span></div>';
  html += '<div class="hint-text">★ 點選下方關卡開始挑戰，每關10題，每題10分 ★</div>';
  html += '<div class="stage-grid">';
  movies.forEach(m => {
    const score = state.stageScores[m.id];
    const cls = score !== null ? ' done' : '';
    html += '<div class="stage-card' + cls + '" data-stage="' + m.id + '">';
    html += '<div class="stage-num">第 ' + (m.id + 1) + ' 關 · ' + m.year + '</div>';
    html += '<div class="stage-name">' + m.name + '</div>';
    html += '<div class="stage-score">' + (score !== null ? score + ' / 100 分' : '尚未挑戰') + '</div>';
    html += '</div>';
  });
  html += '</div>';

  if (state.stageScores.every(s => s !== null)) {
    html += renderFinalResult();
  } else if (state.stageScores.some(s => s !== null)) {
    html += '<div class="center"><button class="btn" id="resetBtn">重新開始</button></div>';
  }

  root.innerHTML = html;

  document.querySelectorAll('.stage-card').forEach(card => {
    card.addEventListener('click', () => {
      const stage = parseInt(card.dataset.stage);
      if (state.stageScores[stage] !== null) {
        if (confirm('這一關你已經挑戰過了（' + state.stageScores[stage] + '分），要重新挑戰嗎？')) {
          state.totalScore -= state.stageScores[stage];
          state.stageScores[stage] = null;
          startStage(stage);
        }
      } else {
        startStage(stage);
      }
    });
  });

  const resetBtn = document.getElementById('resetBtn');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    if (confirm('確定要重新開始所有測驗嗎？')) {
      state = { currentStage: -1, currentQ: 0, stageScore: 0, stageScores: Array(10).fill(null), totalScore: 0, answered: false, selectedAnswer: -1 };
      renderHome();
    }
  });
}

function startStage(stageIdx) {
  state.currentStage = stageIdx;
  state.currentQ = 0;
  state.answered = false;
  state.stageScore = 0;
  renderQuestion();
}

function renderQuestion() {
  const stage = state.currentStage;
  const qIdx = state.currentQ;
  const movie = movies[stage];
  const q = questions[stage][qIdx];

  let html = '<div class="progress-bar">';
  html += '<span class="progress-label">第 ' + (stage + 1) + ' 關：' + movie.name + '（' + movie.year + '）</span>';
  html += '<span class="progress-score">' + state.stageScore + ' 分</span>';
  html += '</div>';

  html += '<div class="question-area">';
  html += '<div class="question-meta"><span>◆ 第 ' + (qIdx + 1) + ' / 10 題 ◆</span><span>本題 10 分</span></div>';
  
  const quoteHtml = q.quote.replace(/\[____\]/g, '<span class="blank">？？？</span>');
  html += '<div class="quote-box">' + quoteHtml;
  html += '<span class="quote-speaker">— ' + q.speaker + ' —</span>';
  html += '</div>';
  
  html += '<div class="question-text">' + q.q + '</div>';
  html += '<div class="options">';
  q.o.forEach((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    let cls = 'option';
    if (state.answered) {
      if (i === q.a) cls += ' correct';
      else if (i === state.selectedAnswer) cls += ' wrong';
    }
    html += '<button class="' + cls + '" data-opt="' + i + '"' + (state.answered ? ' disabled' : '') + '><strong>' + letter + '.</strong> ' + opt + '</button>';
  });
  html += '</div>';

  if (state.answered) {
    const isRight = state.selectedAnswer === q.a;
    html += '<div class="feedback ' + (isRight ? 'right' : 'bad') + '">';
    html += '<strong>' + (isRight ? '✦ 答對了！+10 分 ✦' : '✗ 答錯了') + '</strong>' + q.e;
    html += '</div>';
    html += '<div class="next-btn-wrap"><button class="btn primary" id="nextBtn">' + (qIdx === 9 ? '完成本關' : '下一題') + ' →</button></div>';
  }
  html += '</div>';
  html += '<div class="center"><button class="btn" id="backBtn">← 回到關卡選單</button></div>';

  root.innerHTML = html;

  if (!state.answered) {
    document.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedAnswer = parseInt(btn.dataset.opt);
        state.answered = true;
        if (state.selectedAnswer === q.a) state.stageScore += 10;
        renderQuestion();
      });
    });
  } else {
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (state.currentQ === 9) finishStage();
      else { state.currentQ++; state.answered = false; state.selectedAnswer = -1; renderQuestion(); }
    });
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    if (confirm('離開本關進度將不保存，確定？')) renderHome();
  });
}

function finishStage() {
  const stage = state.currentStage;
  state.stageScores[stage] = state.stageScore;
  state.totalScore += state.stageScore;

  let html = '<div class="stage-result">';
  html += '<div class="stage-result-title">★ 第 ' + (stage + 1) + ' 關完成 ★<br>《' + movies[stage].name + '》</div>';
  html += '<div class="stage-result-score">' + state.stageScore + ' / 100</div>';
  html += '<div class="stage-result-total">目前總分 ' + state.totalScore + ' / 1000</div>';
  html += '</div>';
  html += '<div class="center"><button class="btn primary" id="continueBtn">繼續下一關 →</button></div>';

  root.innerHTML = html;
  document.getElementById('continueBtn').addEventListener('click', renderHome);
}

function renderFinalResult() {
  const total = state.totalScore;
  let rankClass, rankName, msg, trophy;
  if (total >= 901) {
    rankClass = 'r1'; rankName = '👑 周星星後援會會長';
    trophy = '🏆';
    msg = '無厘頭境界已臻化境！從賭聖到大話西遊，每句台詞、每個橋段、每個眼神都瞭如指掌。可以開班授課了，連星爺本人都要拜你為師！';
  } else if (total >= 801) {
    rankClass = 'r2'; rankName = '⭐ 周星星頭號粉絲';
    trophy = '🥇';
    msg = '不愧是星爺鐵粉！經典對白信手拈來，從「I Love You」到「般若波羅蜜」都難不倒你。再多看幾次老片，會長之位指日可待！';
  } else if (total >= 600) {
    rankClass = 'r3'; rankName = '🌟 周星星入門粉絲';
    trophy = '🥈';
    msg = '基本功扎實！你已經摸到星爺電影的精髓了。建議重溫《大話西遊》和《唐伯虎點秋香》，邁向頭號粉絲不是夢！';
  } else {
    rankClass = 'r0'; rankName = '🎬 路人甲';
    trophy = '🎭';
    msg = '「做人如果沒夢想，跟鹹魚有什麼分別？」星爺電影博大精深，趕快重溫經典，下次再來挑戰吧！';
  }

  let html = '<div class="result-area">';
  html += '<div class="result-trophy">' + trophy + '</div>';
  html += '<div class="result-decoration">★ 測 驗 完 成 ★</div>';
  html += '<div class="result-label">最 終 總 分</div>';
  html += '<div class="result-score">' + total + '</div>';
  html += '<div style="font-size:13px;color:#8b1f1a;letter-spacing:3px;">／ 1 0 0 0 ／</div>';
  html += '<div class="result-rank ' + rankClass + '">' + rankName + '</div>';
  html += '<div class="result-msg">「' + msg + '」</div>';
  html += '<div class="center"><button class="btn primary" id="restartBtn">再玩一次</button></div>';
  html += '</div>';
  return html;
}

document.addEventListener('click', e => {
  if (e.target && e.target.id === 'restartBtn') {
    state = { currentStage: -1, currentQ: 0, stageScore: 0, stageScores: Array(10).fill(null), totalScore: 0, answered: false, selectedAnswer: -1 };
    renderHome();
  }
});

renderHome();
</script>
</body>
</html>
