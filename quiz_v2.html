<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌳 宣信魔法森林學園 - 闖關冒險 🌳</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lilita+One&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --forest-deep: #1a3a2e;
  --forest-mid: #2d5a3d;
  --forest-light: #5a8c5e;
  --moss: #7fa650;
  --leaf: #a8d76e;
  --sun: #ffd966;
  --sun-glow: #ffb84d;
  --berry: #e85d75;
  --berry-deep: #c14458;
  --magic: #b88fd8;
  --magic-deep: #7c5fa3;
  --bark: #6b4423;
  --bark-light: #8b5a2b;
  --cream: #fff8e7;
  --mist: #e8f5e9;
  --gold: #f0c14b;
  --gold-deep: #c89824;
  --water: #6bb6d8;
  --water-deep: #4a89a8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', 'Fredoka', sans-serif;
  background: linear-gradient(180deg, #2d5a3d 0%, #1a3a2e 50%, #0f2419 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--cream);
  position: relative;
}

.forest-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.firefly {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--sun);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--sun), 0 0 20px var(--sun-glow), 0 0 30px var(--sun-glow);
  animation: float-firefly 8s infinite ease-in-out;
}

@keyframes float-firefly {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
  25% { transform: translate(30px, -40px) scale(1.2); opacity: 1; }
  50% { transform: translate(-20px, -80px) scale(0.8); opacity: 0.6; }
  75% { transform: translate(40px, -50px) scale(1.1); opacity: 0.9; }
}

.mist-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(168, 215, 110, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(184, 143, 216, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 217, 102, 0.05) 0%, transparent 70%);
}

.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}

.card {
  background: linear-gradient(145deg, #fff8e7 0%, #ffeec7 100%);
  border-radius: 30px;
  padding: 40px;
  box-shadow:
    0 20px 60px rgba(0, 0, 0, 0.4),
    inset 0 2px 0 rgba(255, 255, 255, 0.8),
    0 0 0 4px var(--bark),
    0 0 0 8px var(--gold);
  color: var(--forest-deep);
  position: relative;
  animation: card-appear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes card-appear {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.leaf-deco {
  position: absolute;
  font-size: 40px;
  opacity: 0.6;
  animation: leaf-sway 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes leaf-sway {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(15deg); }
}

.title {
  font-family: 'Lilita One', 'Noto Sans TC', cursive;
  font-size: 48px;
  text-align: center;
  background: linear-gradient(180deg, var(--forest-mid) 0%, var(--forest-deep) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-shadow: 3px 3px 0 rgba(107, 68, 35, 0.1);
}

.subtitle {
  text-align: center;
  font-size: 18px;
  color: var(--bark);
  margin-bottom: 30px;
  font-weight: 500;
}

.subtitle::before { content: "🌿 "; }
.subtitle::after { content: " 🌿"; }

.mascot {
  text-align: center;
  font-size: 90px;
  margin: 15px 0;
  animation: bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
}

@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(0); }
  50% { transform: translateY(-15px) rotate(-5deg); }
}

.input-group { margin-bottom: 22px; }

.input-label {
  display: block;
  font-size: 17px;
  font-weight: 700;
  color: var(--forest-deep);
  margin-bottom: 10px;
}

.input-field {
  width: 100%;
  padding: 14px 18px;
  font-size: 17px;
  font-family: inherit;
  border: 3px solid var(--moss);
  border-radius: 15px;
  background: white;
  color: var(--forest-deep);
  transition: all 0.3s;
}

.input-field:focus {
  outline: none;
  border-color: var(--berry);
  box-shadow: 0 0 0 4px rgba(232, 93, 117, 0.2);
}

.btn {
  display: inline-block;
  padding: 14px 32px;
  font-size: 18px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  letter-spacing: 1px;
}

.btn-primary {
  background: linear-gradient(180deg, var(--berry) 0%, var(--berry-deep) 100%);
  color: white;
  box-shadow: 0 6px 0 var(--berry-deep), 0 8px 20px rgba(232, 93, 117, 0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 9px 0 var(--berry-deep), 0 12px 25px rgba(232, 93, 117, 0.5);
}

.btn-primary:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--berry-deep); }

.btn-magic {
  background: linear-gradient(180deg, var(--magic) 0%, var(--magic-deep) 100%);
  color: white;
  box-shadow: 0 6px 0 var(--magic-deep);
}

.btn-magic:hover { transform: translateY(-3px); box-shadow: 0 9px 0 var(--magic-deep); }

.btn-gold {
  background: linear-gradient(180deg, var(--sun) 0%, var(--gold-deep) 100%);
  color: var(--forest-deep);
  box-shadow: 0 6px 0 var(--gold-deep);
}

.btn-gold:hover { transform: translateY(-3px); box-shadow: 0 9px 0 var(--gold-deep); }

.btn-secondary {
  background: linear-gradient(180deg, #d4d4d4 0%, #999 100%);
  color: var(--forest-deep);
  box-shadow: 0 6px 0 #777;
}

.btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #777; }

.choice-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin: 20px 0;
}

.choice-card {
  background: white;
  border: 4px solid var(--moss);
  border-radius: 20px;
  padding: 25px 15px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.choice-card:hover {
  transform: translateY(-5px) rotate(-1deg);
  border-color: var(--berry);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
}

.choice-card.selected {
  background: linear-gradient(135deg, var(--leaf) 0%, var(--moss) 100%);
  border-color: var(--forest-deep);
  color: white;
  transform: scale(1.05);
}

.choice-emoji {
  font-size: 50px;
  margin-bottom: 8px;
  display: block;
}

.choice-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--forest-deep);
}

.choice-card.selected .choice-text { color: white; }

.grade-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 20px 0;
}

.grade-btn {
  background: linear-gradient(145deg, white 0%, var(--mist) 100%);
  border: 3px solid var(--moss);
  border-radius: 18px;
  padding: 15px 8px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}

.grade-btn:hover {
  transform: translateY(-3px) scale(1.05);
  border-color: var(--berry);
}

.grade-btn.selected {
  background: linear-gradient(135deg, var(--berry) 0%, var(--berry-deep) 100%);
  border-color: var(--forest-deep);
}

.grade-btn.selected .grade-num,
.grade-btn.selected .grade-label { color: white; }

.grade-num {
  font-family: 'Lilita One', cursive;
  font-size: 32px;
  color: var(--berry);
  display: block;
}

.grade-label {
  font-size: 13px;
  color: var(--forest-deep);
  font-weight: 600;
}

/* 學期選擇 */
.semester-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin: 20px 0;
}

.semester-btn {
  background: white;
  border: 3px solid var(--moss);
  border-radius: 18px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  text-align: center;
}

.semester-btn:hover {
  transform: translateY(-3px);
  border-color: var(--berry);
}

.semester-btn.selected {
  background: linear-gradient(135deg, var(--magic) 0%, var(--magic-deep) 100%);
  border-color: var(--forest-deep);
  color: white;
}

.semester-emoji { font-size: 36px; display: block; margin-bottom: 5px; }
.semester-text { font-size: 18px; font-weight: 700; color: var(--forest-deep); }
.semester-btn.selected .semester-text { color: white; }

/* ============== 闖關地圖 ============== */
.map-container {
  position: relative;
  background: linear-gradient(180deg, #cde8a6 0%, #a8d76e 50%, #7fa650 100%);
  border-radius: 25px;
  padding: 30px 20px;
  margin: 20px 0;
  border: 4px solid var(--bark);
  min-height: 580px;
  overflow: hidden;
}

.map-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255, 217, 102, 0.3) 0%, transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(255, 217, 102, 0.2) 0%, transparent 30%);
  pointer-events: none;
}

.map-decoration {
  position: absolute;
  font-size: 32px;
  opacity: 0.7;
  animation: leaf-sway 4s ease-in-out infinite;
  pointer-events: none;
}

.map-path {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.stage {
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 2;
  font-family: inherit;
  border: 5px solid white;
  box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2), 0 12px 25px rgba(0, 0, 0, 0.3);
}

.stage.locked {
  background: linear-gradient(145deg, #999 0%, #666 100%);
  cursor: not-allowed;
  filter: grayscale(0.5);
}

.stage.unlocked {
  background: linear-gradient(145deg, var(--sun) 0%, var(--gold-deep) 100%);
  animation: stage-pulse 2s ease-in-out infinite;
}

.stage.completed {
  background: linear-gradient(145deg, var(--leaf) 0%, var(--moss) 100%);
}

.stage.unlocked:hover { transform: scale(1.15); }

@keyframes stage-pulse {
  0%, 100% { box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2), 0 12px 25px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(255, 217, 102, 0.7); }
  50% { box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2), 0 12px 25px rgba(0, 0, 0, 0.3), 0 0 0 15px rgba(255, 217, 102, 0); }
}

.stage-emoji {
  font-size: 38px;
  margin-bottom: 2px;
}

.stage-num {
  font-family: 'Lilita One', cursive;
  font-size: 16px;
  color: var(--forest-deep);
  background: white;
  padding: 1px 10px;
  border-radius: 10px;
}

.stage-stars {
  position: absolute;
  top: -12px;
  right: -8px;
  background: white;
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 14px;
  border: 2px solid var(--gold);
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
}

.player-marker {
  position: absolute;
  font-size: 40px;
  z-index: 3;
  transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
  animation: player-float 2s ease-in-out infinite;
  pointer-events: none;
}

@keyframes player-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 答題 */
.stats-bar {
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-deep) 100%);
  padding: 15px;
  border-radius: 20px;
  margin: 15px 0;
  color: white;
  border: 3px solid var(--gold);
}

.stat-item { text-align: center; }

.stat-value {
  font-family: 'Lilita One', cursive;
  font-size: 26px;
  color: var(--sun);
  display: block;
}

.stat-label {
  font-size: 11px;
  opacity: 0.9;
}

.progress-bar {
  background: rgba(45, 90, 61, 0.2);
  height: 22px;
  border-radius: 50px;
  overflow: hidden;
  margin: 15px 0;
  border: 3px solid var(--bark);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--leaf) 0%, var(--moss) 50%, var(--sun) 100%);
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.4) 50%, transparent 100%);
  animation: shine 2s infinite;
}

@keyframes shine {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

.question-area {
  background: linear-gradient(135deg, var(--mist) 0%, white 100%);
  border-radius: 20px;
  padding: 25px;
  margin: 15px 0;
  border: 3px dashed var(--moss);
}

.question-number {
  display: inline-block;
  background: var(--berry);
  color: white;
  padding: 4px 14px;
  border-radius: 20px;
  font-weight: 700;
  margin-bottom: 10px;
  font-size: 13px;
}

.stage-badge {
  display: inline-block;
  background: var(--magic-deep);
  color: white;
  padding: 4px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 13px;
  margin-left: 8px;
}

.question-text {
  font-size: 26px;
  font-weight: 700;
  color: var(--forest-deep);
  text-align: center;
  margin: 15px 0;
  line-height: 1.5;
  min-height: 50px;
}

.answers-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 15px;
}

.answer-btn {
  background: white;
  border: 3px solid var(--moss);
  border-radius: 15px;
  padding: 18px;
  font-size: 20px;
  font-weight: 700;
  font-family: inherit;
  color: var(--forest-deep);
  cursor: pointer;
  transition: all 0.2s;
}

.answer-btn:hover {
  transform: translateY(-3px);
  border-color: var(--berry);
  background: var(--cream);
}

.answer-btn.correct {
  background: linear-gradient(135deg, var(--leaf) 0%, var(--moss) 100%);
  border-color: var(--forest-deep);
  color: white;
  animation: correct-pulse 0.5s;
}

.answer-btn.wrong {
  background: linear-gradient(135deg, var(--berry) 0%, var(--berry-deep) 100%);
  border-color: var(--berry-deep);
  color: white;
  animation: wrong-shake 0.5s;
}

@keyframes correct-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes wrong-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

/* 關卡完成頁 */
.stage-complete {
  text-align: center;
  padding: 20px 0;
}

.stage-complete-emoji {
  font-size: 100px;
  animation: celebrate 1s ease-in-out infinite alternate;
  margin: 20px 0;
}

.stars-earned {
  font-size: 60px;
  margin: 20px 0;
  letter-spacing: 10px;
}

.star-empty { opacity: 0.2; filter: grayscale(1); }
.star-filled { animation: star-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
.star-filled:nth-child(1) { animation-delay: 0.2s; }
.star-filled:nth-child(2) { animation-delay: 0.5s; }
.star-filled:nth-child(3) { animation-delay: 0.8s; }

@keyframes star-pop {
  from { transform: scale(0) rotate(-180deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}

@keyframes celebrate {
  from { transform: rotate(-10deg) scale(1); }
  to { transform: rotate(10deg) scale(1.1); }
}

/* 最終結果頁 */
.score-display { text-align: center; margin: 20px 0; }

.score-number {
  font-family: 'Lilita One', cursive;
  font-size: 90px;
  background: linear-gradient(180deg, var(--sun) 0%, var(--gold-deep) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 4px 4px 0 rgba(107, 68, 35, 0.2);
}

.score-label {
  font-size: 22px;
  color: var(--bark);
  font-weight: 700;
}

.medal {
  font-size: 80px;
  text-align: center;
  margin: 15px 0;
}

.feedback-text {
  text-align: center;
  font-size: 20px;
  color: var(--forest-deep);
  font-weight: 600;
  margin: 15px 0;
  line-height: 1.6;
}

/* 排行榜 */
.leaderboard {
  background: linear-gradient(135deg, var(--cream) 0%, white 100%);
  border-radius: 20px;
  padding: 20px;
  margin: 15px 0;
  border: 3px solid var(--gold);
}

.leaderboard-title {
  font-family: 'Lilita One', cursive;
  font-size: 28px;
  text-align: center;
  color: var(--forest-deep);
  margin-bottom: 15px;
}

.lb-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  flex-wrap: wrap;
  justify-content: center;
}

.lb-filter-btn {
  background: white;
  border: 2px solid var(--moss);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  color: var(--forest-deep);
  transition: all 0.2s;
}

.lb-filter-btn.active {
  background: var(--berry);
  border-color: var(--berry-deep);
  color: white;
}

.leader-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 12px 15px;
  border-radius: 12px;
  margin-bottom: 8px;
  border-left: 6px solid var(--moss);
  transition: transform 0.2s;
}

.leader-item:hover { transform: translateX(5px); }

.leader-item.rank-1 {
  border-left-color: var(--gold);
  background: linear-gradient(90deg, rgba(240, 193, 75, 0.2) 0%, white 100%);
}

.leader-item.rank-2 {
  border-left-color: #c0c0c0;
  background: linear-gradient(90deg, rgba(192, 192, 192, 0.2) 0%, white 100%);
}

.leader-item.rank-3 {
  border-left-color: #cd7f32;
  background: linear-gradient(90deg, rgba(205, 127, 50, 0.2) 0%, white 100%);
}

.leader-rank {
  font-family: 'Lilita One', cursive;
  font-size: 24px;
  width: 45px;
  color: var(--berry);
}

.leader-info { flex: 1; margin: 0 12px; }

.leader-name {
  font-weight: 700;
  font-size: 16px;
  color: var(--forest-deep);
}

.leader-detail {
  font-size: 11px;
  color: var(--bark);
}

.leader-score {
  font-family: 'Lilita One', cursive;
  font-size: 22px;
  color: var(--berry);
}

.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
}

.player-info-bar {
  background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-deep) 100%);
  color: white;
  padding: 12px 20px;
  border-radius: 50px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 15px;
  border: 3px solid var(--gold);
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  z-index: 100;
  pointer-events: none;
}

.hidden { display: none !important; }

@media (max-width: 600px) {
  .title { font-size: 32px; }
  .question-text { font-size: 20px; }
  .choice-grid, .answers-grid { grid-template-columns: 1fr; }
  .grade-grid { grid-template-columns: repeat(3, 1fr); }
  .card { padding: 20px 15px; }
  .score-number { font-size: 60px; }
  .stage { width: 90px; height: 90px; }
  .stage-emoji { font-size: 30px; }
  .map-container { padding: 20px 10px; min-height: 600px; }
  .player-info-bar { font-size: 13px; padding: 10px 15px; }
}
</style>
</head>
<body>

<div class="forest-bg">
  <div class="mist-layer"></div>
</div>

<div class="container">

  <!-- 起始頁 -->
  <div id="screen-start" class="card">
    <div class="leaf-deco" style="top: 20px; left: 20px;">🍃</div>

// ============== 數學題目生成（依年級+學期+關卡難度） ==============
// 難度係數 1-5（簡單到難），對應五個關卡
function generateMathQuestion(grade, semester, level) {
  // grade: 1-6, semester: 1=上 2=下, level: 1-5
  // 設計：每個年級每學期都有 5 個難度層級
  const isUpper = semester === 1;
  const used = new Set();

  function makeQ(question, answer, isFloat = false) {
    return makeMC(question, answer, isFloat);
  }

  if (grade === 1) {
    if (isUpper) {
      // 1上：認識10以內數字、加減法
      switch (level) {
        case 1: { const a = rand(1, 5), b = rand(1, 5 - a + 1); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 2: { const a = rand(1, 9), b = rand(1, 10 - a); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 3: { const a = rand(5, 10), b = rand(1, a); return makeQ(`${a} - ${b} = ?`, a - b); }
        case 4: { const a = rand(1, 10); return makeQ(`比 ${a} 多 2 是多少？`, a + 2); }
        case 5: { const a = rand(3, 10); return makeQ(`比 ${a} 少 3 是多少？`, a - 3); }
      }
    } else {
      // 1下：20以內加減
      switch (level) {
        case 1: { const a = rand(5, 10), b = rand(1, 10); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 2: { const a = rand(10, 20), b = rand(1, a); return makeQ(`${a} - ${b} = ?`, a - b); }
        case 3: { const a = rand(11, 19); return makeQ(`${a} 比 10 多多少？`, a - 10); }
        case 4: { const a = rand(8, 15), b = rand(3, 8); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 5: { const a = rand(3, 8); return makeQ(`小明有 ${a} 顆糖，又得到 ${a + 2} 顆，共幾顆？`, a + a + 2); }
      }
    }
  } else if (grade === 2) {
    if (isUpper) {
      // 2上：百以內加減、乘法概念
      switch (level) {
        case 1: { const a = rand(10, 50), b = rand(10, 49); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 2: { const a = rand(50, 99), b = rand(10, a - 5); return makeQ(`${a} - ${b} = ?`, a - b); }
        case 3: { const a = rand(2, 5), b = rand(2, 5); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 4: { const a = rand(20, 60), b = rand(20, 39); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 5: { const a = rand(60, 99), b = rand(20, 50); return makeQ(`${a} - ${b} = ?`, a - b); }
      }
    } else {
      // 2下：九九乘法、進階加減
      switch (level) {
        case 1: { const a = rand(2, 5), b = rand(2, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 2: { const a = rand(2, 9), b = rand(2, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 3: { const a = rand(100, 500), b = rand(50, 200); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 4: { const a = rand(200, 800), b = rand(50, 199); return makeQ(`${a} - ${b} = ?`, a - b); }
        case 5: { const a = rand(3, 9), b = rand(3, 9); return makeQ(`${a} × ${b} 比 ${a*b - 5} 多多少？`, 5); }
      }
    }
  } else if (grade === 3) {
    if (isUpper) {
      // 3上：除法、千以內加減
      switch (level) {
        case 1: { const a = rand(2, 9), b = rand(2, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 2: { const b = rand(2, 9), ans = rand(2, 9); return makeQ(`${b * ans} ÷ ${b} = ?`, ans); }
        case 3: { const a = rand(100, 999), b = rand(100, 500); return makeQ(`${a} + ${b} = ?`, a + b); }
        case 4: { const a = rand(500, 999), b = rand(100, 499); return makeQ(`${a} - ${b} = ?`, a - b); }
        case 5: { const b = rand(3, 9), ans = rand(5, 12); return makeQ(`${b * ans} ÷ ${b} = ?`, ans); }
      }
    } else {
      // 3下：分數概念、進階乘除
      switch (level) {
        case 1: { const a = rand(10, 30), b = rand(2, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 2: { const b = rand(2, 9), ans = rand(10, 20); return makeQ(`${b * ans} ÷ ${b} = ?`, ans); }
        case 3: { return makeQ(`一個圓平均分成 4 份，1 份是幾分之幾？`, '1/4', false, ['1/2', '1/3', '1/4', '2/4']); }
        case 4: { const a = rand(20, 50), b = rand(3, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 5: { const b = rand(4, 9), ans = rand(15, 25); return makeQ(`${b * ans} ÷ ${b} = ?`, ans); }
      }
    }
  } else if (grade === 4) {
    if (isUpper) {
      // 4上：較大數乘除、簡單分數
      switch (level) {
        case 1: { const a = rand(10, 30), b = rand(3, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 2: { const a = rand(20, 50), b = rand(4, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 3: { const b = rand(3, 9), ans = rand(15, 30); return makeQ(`${b * ans} ÷ ${b} = ?`, ans); }
        case 4: { return makeQ(`1/4 + 2/4 = ?`, '3/4', false, ['1/4', '2/4', '3/4', '4/4']); }
        case 5: { const a = rand(100, 300), b = rand(3, 9); return makeQ(`${a} × ${b} = ?`, a * b); }
      }
    } else {
      // 4下：分數運算、小數認識
      switch (level) {
        case 1: { return makeQ(`2/5 + 1/5 = ?`, '3/5', false, ['1/5', '2/5', '3/5', '3/10']); }
        case 2: { return makeQ(`3/7 + 2/7 = ?`, '5/7', false, ['5/14', '5/7', '6/7', '4/7']); }
        case 3: { const a = (rand(10, 50) / 10).toFixed(1); const b = (rand(10, 50) / 10).toFixed(1); const ans = +(parseFloat(a) + parseFloat(b)).toFixed(1); return makeQ(`${a} + ${b} = ?`, ans, true); }
        case 4: { const a = rand(100, 500), b = rand(10, 30); return makeQ(`${a} × ${b} = ?`, a * b); }
        case 5: { const b = rand(5, 12), ans = rand(20, 50); return makeQ(`${b * ans} ÷ ${b} = ?`, ans); }
      }
    }
  } else if (grade === 5) {
    if (isUpper) {
      // 5上：分數加減、小數運算
      switch (level) {
        case 1: { return makeQ(`1/2 + 1/4 = ?`, '3/4', false, ['1/4', '2/6', '3/4', '2/4']); }
        case 2: { return makeQ(`2/3 + 1/6 = ?`, '5/6', false, ['3/9', '5/6', '4/6', '3/6']); }
        case 3: { const a = (rand(10, 90) / 10).toFixed(1); const b = (rand(10, 50) / 10).toFixed(1); const ans = +(parseFloat(a) - parseFloat(b)).toFixed(1); return makeQ(`${a} - ${b} = ?`, ans, true); }
        case 4: { const a = (rand(20, 80) / 10).toFixed(1); const b = rand(2, 5); const ans = +(parseFloat(a) * b).toFixed(1); return makeQ(`${a} × ${b} = ?`, ans, true); }
        case 5: { const a = rand(1000, 3000), b = rand(20, 50); return makeQ(`${a} × ${b} = ?`, a * b); }
      }
    } else {
      // 5下：因數倍數、分數乘法、體積
      switch (level) {
        case 1: { const a = [12, 18, 24, 30, 36][rand(0, 4)]; return makeQ(`${a} 的因數有幾個？`, factorCount(a)); }
        case 2: { return makeQ(`12 和 8 的最大公因數是？`, 4); }
        case 3: { return makeQ(`2/3 × 3/4 = ?`, '1/2', false, ['1/2', '6/12', '5/7', '6/7']); }
        case 4: { const s = rand(3, 8); return makeQ(`邊長 ${s} 公分的正方體體積是多少立方公分？`, s * s * s); }
        case 5: { const a = rand(20, 40); return makeQ(`${a} 的 25% 是多少？`, a * 0.25, true); }
      }
    }
  } else {
    // 6年級
    if (isUpper) {
      // 6上：百分比、比例、圓
      switch (level) {
        case 1: { const b = rand(50, 200), p = [10, 20, 25, 50][rand(0, 3)]; return makeQ(`${b} 的 ${p}% 是多少？`, b * p / 100); }
        case 2: { const a = rand(20, 80); return makeQ(`${a} 是 ${a * 4} 的百分之多少？`, 25); }
        case 3: { const r = rand(3, 10); return makeQ(`半徑 ${r} 公分的圓周長約是多少公分？(π=3.14)`, +(2 * 3.14 * r).toFixed(2), true); }
        case 4: { return makeQ(`若 a:b = 3:5，b = 20，則 a = ?`, 12); }
        case 5: { const r = rand(2, 8); return makeQ(`半徑 ${r} 公分的圓面積約是多少平方公分？(π=3.14)`, +(3.14 * r * r).toFixed(2), true); }
      }
    } else {
      // 6下：方程式、複雜應用、統計
      switch (level) {
        case 1: { const x = rand(5, 20), c = rand(5, 30); return makeQ(`若 x + ${c} = ${x + c}，x = ?`, x); }
        case 2: { const x = rand(3, 12), m = rand(2, 6); return makeQ(`若 ${m}x = ${m * x}，x = ?`, x); }
        case 3: { const x = rand(5, 15), m = rand(2, 5), c = rand(3, 10); return makeQ(`若 ${m}x + ${c} = ${m * x + c}，x = ?`, x); }
        case 4: { return makeQ(`一商品原價 800 元，打 7 折是多少元？`, 560); }
        case 5: { return makeQ(`一商品原價 1000 元，先打 8 折再 9 折，最後價格是？`, 720); }
      }
    }
  }
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function factorCount(n) {
  let count = 0;
  for (let i = 1; i <= n; i++) if (n % i === 0) count++;
  return count;
}

function makeMC(question, answer, isFloat = false, customOpts = null) {
  if (customOpts) {
    return { q: question, options: [...customOpts].sort(() => Math.random() - 0.5), correct: String(answer) };
  }
  const opts = new Set([String(answer)]);
  const numAns = parseFloat(answer);
  let attempts = 0;
  while (opts.size < 4 && attempts < 30) {
    attempts++;
    const offset = (Math.floor(Math.random() * 9) + 1) * (Math.random() < 0.5 ? -1 : 1);
    let wrong;
    if (isFloat) {
      wrong = +(numAns + offset * 0.1 * (Math.random() < 0.5 ? 1 : 10)).toFixed(2);
    } else {
      const scale = numAns > 100 ? 10 : 1;
      wrong = numAns + offset * scale;
    }
    if (wrong >= 0 && wrong !== numAns) opts.add(String(wrong));
  }
  return { q: question, options: [...opts].sort(() => Math.random() - 0.5), correct: String(answer) };
}

function generateMathStage(grade, semester, level) {
  const questions = [];
  const seen = new Set();
  let tries = 0;
  while (questions.length < 10 && tries < 100) {
    tries++;
    const q = generateMathQuestion(grade, semester, level);
    if (!seen.has(q.q)) {
      seen.add(q.q);
      questions.push(q);
    }
  }
  // 補滿
  while (questions.length < 10) {
    questions.push(generateMathQuestion(grade, semester, level));
  }
  return questions;
}

function generateEnglishStage(grade, semester, level) {
  const key = `${grade}-${semester}`;
  const bank = englishBank[key];
  if (!bank || !bank[level]) {
    // 找不到時用一上第一關
    return englishBank['1-1'][1].slice(0, 10);
  }
  const pool = [...bank[level]];
  // 洗牌
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 10);
}

function renderMap() {
  const semesterText = state.semester === 1 ? '上學期' : '下學期';
  const subjectText = state.subject === 'math' ? '🔢 數學魔法' : '🔤 英文咒語';
  document.getElementById('map-player-name').textContent = state.name;
  document.getElementById('map-info-text').textContent = `${state.grade}年級 ${semesterText} · ${subjectText}`;
  document.getElementById('map-subtitle').textContent = `從新芽小徑到森林王座 · 五關挑戰`;

  const totalStars = state.starsPerStage.reduce((a, b) => a + b, 0);
  document.getElementById('map-total-stars').textContent = totalStars;

  const map = document.getElementById('map');
  map.innerHTML = '';

  // 裝飾
  const decos = [
    { emoji: '🌲', left: '5%', top: '20%' },
    { emoji: '🌲', left: '85%', top: '60%' },
    { emoji: '🌸', left: '70%', top: '85%' },
    { emoji: '🌺', left: '20%', top: '40%' },
    { emoji: '🦋', left: '60%', top: '70%' },
    { emoji: '🐝', left: '90%', top: '15%' },
    { emoji: '🌿', left: '40%', top: '88%' },
    { emoji: '🍄', left: '8%', top: '50%' },
  ];
  decos.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'map-decoration';
    div.textContent = d.emoji;
    div.style.left = d.left;
    div.style.top = d.top;
    div.style.animationDelay = (i * 0.3) + 's';
    map.appendChild(div);
  });

  // 路徑（SVG）
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class', 'map-path');
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.style.width = '100%';
  svg.style.height = '100%';
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';

  // 取每關位置中心點
  const pts = stagePositions.map(p => ({
    x: parseFloat(p.left),
    y: parseFloat(p.top),
  }));

  // 繪製虛線路徑連接每一關
  for (let i = 0; i < pts.length - 1; i++) {
    const path = document.createElementNS(svgNS, 'path');
    const x1 = pts[i].x, y1 = pts[i].y;
    const x2 = pts[i + 1].x, y2 = pts[i + 1].y;
    const cx = (x1 + x2) / 2 + (Math.random() - 0.5) * 8;
    const cy = (y1 + y2) / 2 + (Math.random() - 0.5) * 5;
    path.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
    path.setAttribute('stroke', i < state.unlockedStage - 1 ? '#c89824' : '#6b4423');
    path.setAttribute('stroke-width', '0.8');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', '2 1.5');
    path.setAttribute('opacity', '0.6');
    svg.appendChild(path);
  }
  map.appendChild(svg);

  // 各關卡按鈕
  stagePositions.forEach((pos, i) => {
    const stageNum = i + 1;
    const btn = document.createElement('button');
    btn.className = 'stage';
    btn.style.left = pos.left;
    btn.style.top = pos.top;
    btn.style.transform = 'translate(-50%, -50%)';

    const isCompleted = state.starsPerStage[i] > 0;
    const isUnlocked = stageNum <= state.unlockedStage;

    if (isCompleted) btn.classList.add('completed');
    else if (isUnlocked) btn.classList.add('unlocked');
    else btn.classList.add('locked');

    btn.innerHTML = `
      <div class="stage-emoji">${isUnlocked ? pos.emoji : '🔒'}</div>
      <div class="stage-num">第${stageNum}關</div>
      ${isCompleted ? `<div class="stage-stars">${'⭐'.repeat(state.starsPerStage[i])}</div>` : ''}
    `;

    if (isUnlocked) {
      btn.onclick = () => startStage(stageNum);
    }
    map.appendChild(btn);
  });

  // 玩家標記
  const player = document.createElement('div');
  player.className = 'player-marker';
  player.textContent = '🧚';
  const cur = stagePositions[Math.min(state.unlockedStage - 1, 4)];
  player.style.left = cur.left;
  player.style.top = cur.top;
  player.style.transform = 'translate(-50%, -120%)';
  map.appendChild(player);
}

function startStage(stageNum) {
  state.currentStage = stageNum;
  state.questions = state.subject === 'math'
    ? generateMathStage(state.grade, state.semester, stageNum)
    : generateEnglishStage(state.grade, state.semester, stageNum);
  state.currentIndex = 0;
  state.stageScore = 0;
  state.stageCorrect = 0;
  state.streak = 0;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  document.getElementById('q-number').textContent = `第 ${state.currentIndex + 1} 題 / 共 10 題`;
  document.getElementById('q-stage').textContent = `第 ${state.currentStage} 關`;
  document.getElementById('current-q').textContent = state.currentIndex + 1;
  document.getElementById('current-stage').textContent = state.currentStage;
  document.getElementById('current-score').textContent = state.stageScore;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('progress').style.width = ((state.currentIndex) / 10 * 100) + '%';

  const mascots = ['🧚', '🦉', '🐿️', '🦊', '🦔', '🐢', '🦋', '🐝', '🌳', '🍄'];
  document.getElementById('quiz-mascot').textContent = mascots[state.currentIndex % mascots.length];

  document.getElementById('question-text').textContent = q.q;

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, opt, q.correct);
    answersDiv.appendChild(btn);
  });
}

function selectAnswer(btn, selected, correct) {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  if (String(selected) === String(correct)) {
    btn.classList.add('correct');
    // 較高關卡分數較高
    const points = 5 + state.currentStage * 2; // 第1關7分 第5關15分
    state.stageScore += points;
    state.totalScore += points;
    state.stageCorrect++;
    state.totalCorrect++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    burstConfetti();
  } else {
    btn.classList.add('wrong');
    state.streak = 0;
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }

  setTimeout(() => {
    state.currentIndex++;
    if (state.currentIndex >= 10) {
      finishStage();
    } else {
      renderQuestion();
    }
  }, 1100);
}

function finishStage() {
  document.getElementById('progress').style.width = '100%';

  setTimeout(() => {
    // 計算星星
    let stars = 0;
    if (state.stageCorrect >= 9) stars = 3;
    else if (state.stageCorrect >= 7) stars = 2;
    else if (state.stageCorrect >= 5) stars = 1;
    else stars = 0;

    state.starsPerStage[state.currentStage - 1] = Math.max(state.starsPerStage[state.currentStage - 1], stars);

    // 通過至少1顆星才解鎖下一關
    if (stars >= 1 && state.currentStage < 5) {
      state.unlockedStage = Math.max(state.unlockedStage, state.currentStage + 1);
    }

    // 渲染結果
    document.getElementById('stage-correct').textContent = state.stageCorrect;
    document.getElementById('stage-score-val').textContent = state.stageScore;
    document.getElementById('total-score-now').textContent = state.totalScore;

    let starsHtml = '';
    for (let i = 1; i <= 3; i++) {
      starsHtml += `<span class="${i <= stars ? 'star-filled' : 'star-empty'}">⭐</span>`;
    }
    document.getElementById('stars-earned').innerHTML = starsHtml;

    let mascot, feedback, title;
    if (stars === 3) {
      mascot = '🦄'; title = '完美通關！'; feedback = `太厲害了！${stagePositions[state.currentStage - 1].name} 完美征服！`;
    } else if (stars === 2) {
      mascot = '🧚'; title = '順利過關！'; feedback = `做得很好！繼續努力可以拿到三顆星喔！`;
    } else if (stars === 1) {
      mascot = '🦉'; title = '勉強過關'; feedback = `通過了！但還有進步空間，再挑戰看看吧！`;
    } else {
      mascot = '🐿️'; title = '需要再努力'; feedback = `這關還沒過喔！再挑戰看看，你可以的！`;
    }

    document.getElementById('stage-mascot').textContent = mascot;
    document.getElementById('stage-complete-title').textContent = title;
    document.getElementById('stage-feedback').textContent = feedback;

    // 按鈕
    const btnsDiv = document.getElementById('stage-complete-btns');
    btnsDiv.innerHTML = '';

    if (stars === 0) {
      // 失敗
      btnsDiv.innerHTML = `
        <button class="btn btn-primary" onclick="retryStage()">🔄 再挑戰這關</button>
        <button class="btn btn-secondary" onclick="backToMap()">🗺️ 回地圖</button>
      `;
    } else if (state.currentStage === 5) {
      // 最後一關通過
      btnsDiv.innerHTML = `
        <button class="btn btn-primary" onclick="showFinalResult()">🏆 查看結算</button>
      `;
      burstConfetti(true);
    } else {
      btnsDiv.innerHTML = `
        <button class="btn btn-primary" onclick="nextStage()">➡️ 下一關</button>
        <button class="btn btn-magic" onclick="retryStage()">🔄 重挑這關</button>
        <button class="btn btn-secondary" onclick="backToMap()">🗺️ 回地圖</button>
      `;
      burstConfetti(true);
    }

    showScreen('stage-complete');
  }, 600);
}

function nextStage() {
  startStage(state.currentStage + 1);
}

function retryStage() {
  // 重挑時要把這關剛剛累計的分數扣回去（避免重複加分）
  state.totalScore -= state.stageScore;
  state.totalCorrect -= state.stageCorrect;
  startStage(state.currentStage);
}

function backToMap() {
  // 同樣扣回該關剛累計的分數，避免下次又加
  state.totalScore -= state.stageScore;
  state.totalCorrect -= state.stageCorrect;
  state.stageScore = 0;
  state.stageCorrect = 0;
  renderMap();
  showScreen('map');
}

function showFinalResult() {
  const totalStars = state.starsPerStage.reduce((a, b) => a + b, 0);

  document.getElementById('final-score').textContent = state.totalScore;
  document.getElementById('final-correct').textContent = state.totalCorrect;
  document.getElementById('final-stars-num').textContent = totalStars;
  document.getElementById('final-streak').textContent = state.bestStreak;

  let starsHtml = '';
  for (let i = 1; i <= 15; i++) {
    starsHtml += `<span class="${i <= totalStars ? 'star-filled' : 'star-empty'}">⭐</span>`;
  }
  document.getElementById('final-stars').innerHTML = starsHtml;

  let medal, feedback;
  if (totalStars >= 14) {
    medal = '🥇👑';
    feedback = `${state.name}，你是傳說中的森林大法師！完美征服整片森林！`;
  } else if (totalStars >= 11) {
    medal = '🥇';
    feedback = `${state.name}，太厲害了！你已經是高階魔法師了！`;
  } else if (totalStars >= 8) {
    medal = '🥈';
    feedback = `${state.name}，做得很棒！再多練習就能獲得最高榮耀！`;
  } else if (totalStars >= 5) {
    medal = '🥉';
    feedback = `${state.name}，你成功通關了！繼續修煉一定會更厲害！`;
  } else {
    medal = '🌱';
    feedback = `${state.name}，恭喜你完成冒險！每位大法師都是這樣練成的！`;
  }

  document.getElementById('final-medal').textContent = medal;
  document.getElementById('final-feedback').textContent = feedback;

  saveScore(totalStars);
  showScreen('final');
  burstConfetti(true);
  setTimeout(() => burstConfetti(true), 800);
}

// ============== 排行榜 ==============
let leaderboardData = [];
let lbFilter = 'all';

function saveScore(totalStars) {
  leaderboardData.push({
    name: state.name,
    grade: state.grade,
    semester: state.semester,
    subject: state.subject,
    score: state.totalScore,
    correct: state.totalCorrect,
    stars: totalStars,
    date: new Date().toLocaleDateString('zh-TW'),
  });
  leaderboardData.sort((a, b) => b.score - a.score || b.stars - a.stars);
  if (leaderboardData.length > 50) leaderboardData = leaderboardData.slice(0, 50);
}

document.querySelectorAll('.lb-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lb-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    lbFilter = btn.dataset.filter;
    renderLeaderboard();
  });
});

function renderLeaderboard() {
  const list = document.getElementById('leader-list');
  list.innerHTML = '';

  let data = leaderboardData;
  if (lbFilter !== 'all') {
    data = leaderboardData.filter(d => d.subject === lbFilter);
  }

  if (data.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#6b4423;font-size:16px;">🌱 還沒有人挑戰過喔！<br>趕快成為第一位森林大法師吧！</div>';
  } else {
    data.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = `leader-item ${i < 3 ? 'rank-' + (i + 1) : ''}`;
      const rankEmoji = i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
      const subjectIcon = item.subject === 'math' ? '🔢' : '🔤';
      const semesterText = item.semester === 1 ? '上' : '下';
      div.innerHTML = `
        <div class="leader-rank">${rankEmoji}</div>
        <div class="leader-info">
          <div class="leader-name">${item.name}</div>
          <div class="leader-detail">${item.grade}年${semesterText} · ${subjectIcon} · ⭐${item.stars} · ${item.correct}/50 · ${item.date}</div>
        </div>
        <div class="leader-score">${item.score}</div>
      `;
      list.appendChild(div);
    });
  }
}

function showLeaderboard() {
  renderLeaderboard();
  showScreen('leaderboard');
}

function clearLeaderboard() {
  if (confirm('🗑️ 確定要清空排行榜嗎？')) {
    leaderboardData = [];
    renderLeaderboard();
  }
}

function restartAdventure() {
  state.currentStage = 1;
  state.totalScore = 0;
  state.totalCorrect = 0;
  state.bestStreak = 0;
  state.starsPerStage = [0, 0, 0, 0, 0];
  state.unlockedStage = 1;
  renderMap();
  showScreen('map');
}

function goHome() {
  // 重置所有選擇
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.semester-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('player-name').value = '';
  state = {
    name: '', grade: null, semester: null, subject: null,
    currentStage: 1, questions: [], currentIndex: 0,
    stageScore: 0, totalScore: 0, totalCorrect: 0, stageCorrect: 0,
    streak: 0, bestStreak: 0,
    starsPerStage: [0, 0, 0, 0, 0], unlockedStage: 1,
  };
  showScreen('start');
}

function showScreen(name) {
  ['start', 'map', 'quiz', 'stage-complete', 'final', 'leaderboard'].forEach(s => {
    document.getElementById(`screen-${s}`).classList.add('hidden');
  });
  document.getElementById(`screen-${name}`).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============== 慶祝彩帶 ==============
function burstConfetti(big = false) {
  const colors = ['#ffd966', '#e85d75', '#a8d76e', '#b88fd8', '#7fa650', '#f0c14b'];
  const count = big ? 80 : 20;
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.left = (50 + (Math.random() - 0.5) * 30) + '%';
    c.style.top = '50%';
    c.style.borderRadius = Math.random() < 0.5 ? '50%' : '0';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(c);

    const angle = Math.random() * Math.PI * 2;
    const speed = 200 + Math.random() * 300;
    const tx = Math.cos(angle) * speed;
    const ty = Math.sin(angle) * speed - 200;

    c.animate([
      { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${tx}px, ${ty + 600}px) rotate(${720 + Math.random() * 360}deg)`, opacity: 0 }
    ], { duration: 1500 + Math.random() * 500, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' });

    setTimeout(() => c.remove(), 2000);
  }
}
